apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: deploy-fbc-operator-with-iqe
spec:
  description: >
    Extension pipeline that preserves deploy-fbc-operator baseline behavior and
    inserts IQE execution after operator deployment.
  workspaces:
    - name: shared-data
  params:
    - name: SNAPSHOT
      type: string
      description: Integration snapshot payload.
    - name: PACKAGE_NAME
      type: string
      default: costmanagement-metrics-operator
    - name: CHANNEL_NAME
      type: string
      default: stable
    - name: RELEASED_BUNDLE_IMAGE_OVERRIDE
      type: string
      description: Temporary override to force testing with a released bundle image.
      default: ""
    - name: PATH_TO_MIRROR_SET
      type: string
      description: Path to ImageDigestMirrorSet file in source repo.
      default: .tekton/images-mirror-set.yaml
    - name: IQE_PLUGINS
      type: string
      default: cost_management
    - name: IQE_IMAGE
      type: string
      default: quay.io/cloudservices/iqe-tests:cost-management
    - name: IQE_MARKER_EXPRESSION
      type: string
      default: cost_operator
    - name: IQE_FILTER_EXPRESSION
      type: string
      default: ""
    - name: IQE_ENV
      type: string
      default: prod
    - name: IQE_EXTRA_ARGS
      type: string
      default: ""
    - name: DYNACONF_IQE_VAULT_LOADER_ENABLED
      type: string
      default: "true"
    - name: DYNACONF_IQE_VAULT_URL
      type: string
      default: https://vault.ci.ext.devshift.net
    - name: DYNACONF_IQE_VAULT_MOUNT_POINT
      type: string
      default: insights
    - name: DYNACONF_IQE_VAULT_VERIFY
      type: string
      default: "true"
    - name: DYNACONF_IQE_VAULT_ROLE_ID
      type: string
      default: ""
  tasks:
    - name: parse-metadata
      taskRef:
        resolver: git
        params:
          - name: url
            value: https://github.com/konflux-ci/integration-examples
          - name: revision
            value: main
          - name: pathInRepo
            value: tasks/test_metadata.yaml
      params:
        - name: SNAPSHOT
          value: $(params.SNAPSHOT)

    - name: provision-eaas-space
      runAfter:
        - parse-metadata
      when:
        - input: $(tasks.parse-metadata.results.test-event-type)
          operator: in
          values: ["push", "Push", "pull_request"]
      taskRef:
        resolver: git
        params:
          - name: url
            value: https://github.com/konflux-ci/build-definitions.git
          - name: revision
            value: main
          - name: pathInRepo
            value: task/eaas-provision-space/0.1/eaas-provision-space.yaml
      params:
        - name: ownerName
          value: $(context.pipelineRun.name)
        - name: ownerUid
          value: $(context.pipelineRun.uid)

    - name: fetch-config-files
      runAfter:
        - provision-eaas-space
      when:
        - input: $(tasks.parse-metadata.results.test-event-type)
          operator: in
          values: ["push", "Push", "pull_request"]
      taskSpec:
        workspaces:
          - name: shared-data
        results:
          - name: mirrorSetYaml
            description: Contents of the mirror set yaml file.
          - name: serializedMirrorSetYaml
            description: Mirror entries used for imageContentSources.
        steps:
          - name: retrieve-mirror-set
            image: quay.io/konflux-ci/konflux-test:v1.4.48
            env:
              - name: SOURCE_GIT_URL
                value: "$(tasks.parse-metadata.results.source-git-url)"
              - name: SOURCE_GIT_REVISION
                value: "$(tasks.parse-metadata.results.source-git-revision)"
              - name: PATH_TO_MIRROR_SET
                value: $(params.PATH_TO_MIRROR_SET)
            script: |
              #!/usr/bin/env bash
              set -euo pipefail
              . /utils.sh
              mirror_set_url="${SOURCE_GIT_URL}/raw/${SOURCE_GIT_REVISION}/${PATH_TO_MIRROR_SET}"
              mirror_set_yaml=$(curl -kfLs "$mirror_set_url" 2>/dev/null)
              if [[ -z "${mirror_set_yaml}" ]]; then
                echo "Could not fetch image mirror set at ${mirror_set_url}."
                exit 1
              fi

              echo -n "${mirror_set_yaml}" > "$(results.mirrorSetYaml.path)"
              serialized_mirror_set=$(serialize_image_mirrors_yaml "${mirror_set_yaml}")
              echo -e "${serialized_mirror_set}" > "$(results.serializedMirrorSetYaml.path)"
              echo -e "${serialized_mirror_set}" > /workspace/shared-data/serializedMirrorSet.yaml
      workspaces:
        - name: shared-data
          workspace: shared-data

    - name: get-unreleased-bundle
      runAfter:
        - fetch-config-files
      when:
        - input: $(tasks.parse-metadata.results.test-event-type)
          operator: in
          values: ["push", "Push", "pull_request"]
      taskSpec:
        results:
          - name: unreleasedBundle
            description: Unreleased bundle image (or mirrored variant).
          - name: packageName
            description: Resolved package name.
          - name: channelName
            description: Resolved channel name.
        steps:
          - name: resolve-bundle-image
            image: quay.io/konflux-ci/konflux-test:v1.4.48
            env:
              - name: FBC_FRAGMENT
                value: "$(tasks.parse-metadata.results.component-container-image)"
              - name: PACKAGE_NAME
                value: $(params.PACKAGE_NAME)
              - name: CHANNEL_NAME
                value: $(params.CHANNEL_NAME)
              - name: BUNDLE_IMAGE_OVERRIDE
                value: "$(params.RELEASED_BUNDLE_IMAGE_OVERRIDE)"
              - name: MIRROR_SET_YAML
                value: "$(tasks.fetch-config-files.results.mirrorSetYaml)"
            script: |
              #!/usr/bin/env bash
              set -euo pipefail
              . /utils.sh

              write_results() {
                local bundle_image="${1:-}"
                echo -n "${bundle_image}" > "$(results.unreleasedBundle.path)"
                echo -n "${resolved_package}" > "$(results.packageName.path)"
                echo -n "${resolved_channel}" > "$(results.channelName.path)"
              }

              bundle_image=""
              resolved_package="${PACKAGE_NAME}"
              resolved_channel="${CHANNEL_NAME}"
              replaced_image=""
              # Treat unset/blank/null-like override values as "not provided".
              normalized_override="${BUNDLE_IMAGE_OVERRIDE:-}"
              normalized_override="${normalized_override#"${normalized_override%%[![:space:]]*}"}"
              normalized_override="${normalized_override%"${normalized_override##*[![:space:]]}"}"
              if [[ "${normalized_override}" == "null" ]]; then
                normalized_override=""
              fi

              if [[ -n "${normalized_override}" ]]; then
                # When testing a released bundle, skip the unreleased-bundle lookup entirely.
                echo "Skipping unreleased bundle lookup because RELEASED_BUNDLE_IMAGE_OVERRIDE is set."
                echo "Using released bundle override: ${normalized_override}"
                bundle_image="${normalized_override}"
              else
                if [[ -z "${FBC_FRAGMENT}" ]]; then
                  echo "Error: FBC_FRAGMENT parameter is required." >&2
                  exit 1
                fi

                echo "Retrieving unreleased bundles..."
                if ! unreleased_bundles=$(get_unreleased_bundles -i "$FBC_FRAGMENT"); then
                  echo "Could not get unreleased bundle images from the fragment. Make sure you have ImagePullCredentials for registry.redhat.io" >&2
                  exit 1
                fi

                if [[ -z "${unreleased_bundles}" ]]; then
                  echo "No unreleased bundles found. Exiting as a no-op."
                  write_results ""
                  exit 0
                fi
                echo "Unreleased bundles found: ${unreleased_bundles}"

                if ! render_out_fbc=$(render_opm -t "$FBC_FRAGMENT"); then
                  echo "Failed to render the FBC fragment" >&2
                  exit 1
                fi

                if [[ -z "${resolved_package}" ]]; then
                  echo "Checking package association of unreleased bundles..."
                  package_image_map=$(group_bundle_images_by_package "$render_out_fbc" "$unreleased_bundles")
                  echo "Package-image map: $package_image_map"
                  package_count=$(echo "$package_image_map" | jq 'keys | length')

                  if [[ "$package_count" -gt 1 ]]; then
                    echo "Error: Multiple packages detected. User must specify PACKAGE_NAME." >&2
                    exit 1
                  fi

                  resolved_package=$(echo "$package_image_map" | jq -r 'keys[0]')
                fi
                echo "Using package: ${resolved_package}"

                if [[ -z "${resolved_channel}" ]]; then
                  resolved_channel=$(get_channel_from_catalog "$render_out_fbc" "$resolved_package")
                  if [[ -z "${resolved_channel}" ]]; then
                    echo "Failed to determine a default channel for package '$resolved_package'" >&2
                    exit 1
                  fi
                fi
                echo "Using channel: ${resolved_channel}"

                if ! bundle_image=$(get_highest_version_from_bundles_list "$render_out_fbc" "$resolved_package" "$resolved_channel" "$unreleased_bundles"); then
                  echo "No unreleased bundle(s) found matching the specified package and/or channel. Exiting as a no-op."
                  write_results ""
                  exit 0
                fi
                echo "Highest bundle: ${bundle_image}"
              fi

              if [[ -z "${bundle_image}" || "${bundle_image}" == "null" ]]; then
                write_results "${replaced_image}"
                exit 0
              fi

              if skopeo inspect --no-tags --config "docker://${bundle_image}" > /dev/null 2>&1; then
                write_results "${bundle_image}"
                exit 0
              fi

              process_image_digest_mirror_set "$MIRROR_SET_YAML" > /tekton/home/mirror-map.txt
              reg_and_repo=$(get_image_registry_and_repository "${bundle_image}")
              mirrors=$(jq -r --arg source "${reg_and_repo}" '.[$source][]?' /tekton/home/mirror-map.txt)

              if [[ -z "${mirrors}" ]]; then
                echo "No mirrors listed for $reg_and_repo in mirror map."
                exit 1
              fi

              for mirror in ${mirrors}; do
                replaced_image=$(replace_image_pullspec "$bundle_image" "$mirror")
                if skopeo inspect --no-tags --config "docker://${replaced_image}" > /dev/null 2>&1; then
                  write_results "${replaced_image}"
                  exit 0
                fi
              done

              echo "No working mirrors found for $reg_and_repo"
              exit 1

    - name: pick-cluster-params
      runAfter:
        - get-unreleased-bundle
      when:
        - input: "$(tasks.get-unreleased-bundle.results.unreleasedBundle)"
          operator: notin
          values: [""]
        - input: $(tasks.parse-metadata.results.test-event-type)
          operator: in
          values: ["push", "Push", "pull_request"]
      taskSpec:
        results:
          - name: ocpVersion
            value: "$(steps.pick-cluster-version.results.ocpVersion)"
          - name: bundleArch
            value: "$(steps.pick-cluster-arch.results.bundleArch)"
        steps:
          - name: get-supported-versions
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/konflux-ci/build-definitions.git
                - name: revision
                  value: main
                - name: pathInRepo
                  value: stepactions/eaas-get-supported-ephemeral-cluster-versions/0.1/eaas-get-supported-ephemeral-cluster-versions.yaml
            params:
              - name: eaasSpaceSecretRef
                value: "$(tasks.provision-eaas-space.results.secretRef)"
          - name: pick-cluster-version
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/konflux-ci/tekton-integration-catalog.git
                - name: revision
                  value: main
                - name: pathInRepo
                  value: stepactions/bundles/pick-cluster-version/0.1/pick-cluster-version.yaml
            params:
              - name: fbcFragment
                value: "$(tasks.parse-metadata.results.component-container-image)"
              - name: clusterVersions
                value: ["$(steps.get-supported-versions.results.versions[*])"]
          - name: pick-cluster-arch
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/konflux-ci/tekton-integration-catalog.git
                - name: revision
                  value: main
                - name: pathInRepo
                  value: stepactions/bundles/pick-cluster-arch/0.1/pick-cluster-arch.yaml
            params:
              - name: bundleImage
                value: "$(tasks.get-unreleased-bundle.results.unreleasedBundle)"

    - name: provision-cluster
      retries: 1
      runAfter:
        - pick-cluster-params
      when:
        - input: "$(tasks.get-unreleased-bundle.results.unreleasedBundle)"
          operator: notin
          values: [""]
        - input: "$(tasks.pick-cluster-params.results.ocpVersion)"
          operator: notin
          values: [""]
        - input: "$(tasks.pick-cluster-params.results.bundleArch)"
          operator: notin
          values: [""]
        - input: $(tasks.parse-metadata.results.test-event-type)
          operator: in
          values: ["push", "Push", "pull_request"]
      taskSpec:
        workspaces:
          - name: shared-data
        results:
          - name: clusterName
            value: "$(steps.create-cluster.results.clusterName)"
        steps:
          - name: get-latest-version-tag
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/konflux-ci/build-definitions.git
                - name: revision
                  value: main
                - name: pathInRepo
                  value: stepactions/eaas-get-latest-openshift-version-by-prefix/0.1/eaas-get-latest-openshift-version-by-prefix.yaml
            params:
              - name: prefix
                value: "$(tasks.pick-cluster-params.results.ocpVersion)"
          - name: create-cluster
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/konflux-ci/build-definitions.git
                - name: revision
                  value: main
                - name: pathInRepo
                  value: stepactions/eaas-create-ephemeral-cluster-hypershift-aws/0.1/eaas-create-ephemeral-cluster-hypershift-aws.yaml
            params:
              - name: eaasSpaceSecretRef
                value: $(tasks.provision-eaas-space.results.secretRef)
              - name: version
                value: "$(steps.get-latest-version-tag.results.version)"
              - name: instanceType
                value: "$(tasks.pick-cluster-params.results.bundleArch)"
              - name: imageContentSourcesFile
                value: /workspace/shared-data/serializedMirrorSet.yaml
      workspaces:
        - name: shared-data
          workspace: shared-data

    - name: run-iqe-cost-operator
      runAfter:
        - provision-cluster
      when:
        - input: $(tasks.parse-metadata.results.test-event-type)
          operator: in
          values: ["push", "Push", "pull_request"]
      params:
        - name: EAAS_SPACE_SECRET_REF
          value: $(tasks.provision-eaas-space.results.secretRef)
        - name: CLUSTER_NAME
          value: $(tasks.provision-cluster.results.clusterName)
        - name: IQE_PLUGINS
          value: $(params.IQE_PLUGINS)
        - name: IQE_IMAGE
          value: $(params.IQE_IMAGE)
        - name: IQE_MARKER_EXPRESSION
          value: $(params.IQE_MARKER_EXPRESSION)
        - name: IQE_FILTER_EXPRESSION
          value: $(params.IQE_FILTER_EXPRESSION)
        - name: IQE_ENV
          value: $(params.IQE_ENV)
        - name: IQE_EXTRA_ARGS
          value: $(params.IQE_EXTRA_ARGS)
        - name: DYNACONF_IQE_VAULT_LOADER_ENABLED
          value: $(params.DYNACONF_IQE_VAULT_LOADER_ENABLED)
        - name: DYNACONF_IQE_VAULT_URL
          value: $(params.DYNACONF_IQE_VAULT_URL)
        - name: DYNACONF_IQE_VAULT_MOUNT_POINT
          value: $(params.DYNACONF_IQE_VAULT_MOUNT_POINT)
        - name: DYNACONF_IQE_VAULT_VERIFY
          value: $(params.DYNACONF_IQE_VAULT_VERIFY)
        - name: DYNACONF_IQE_VAULT_ROLE_ID
          value: $(params.DYNACONF_IQE_VAULT_ROLE_ID)
      taskSpec:
        params:
          - name: EAAS_SPACE_SECRET_REF
            type: string
          - name: CLUSTER_NAME
            type: string
          - name: IQE_IMAGE
            type: string
            default: quay.io/cloudservices/iqe-tests:cost-management
          - name: IQE_PLUGINS
            type: string
            default: cost_management
          - name: IQE_MARKER_EXPRESSION
            type: string
            default: cost_operator
          - name: IQE_FILTER_EXPRESSION
            type: string
            default: ""
          - name: IQE_ENV
            type: string
            default: prod
          - name: IQE_EXTRA_ARGS
            type: string
            default: ""
          - name: DYNACONF_IQE_VAULT_LOADER_ENABLED
            type: string
            default: "true"
          - name: DYNACONF_IQE_VAULT_URL
            type: string
            default: https://vault.ci.ext.devshift.net
          - name: DYNACONF_IQE_VAULT_MOUNT_POINT
            type: string
            default: insights
          - name: DYNACONF_IQE_VAULT_VERIFY
            type: string
            default: "true"
          - name: DYNACONF_IQE_VAULT_ROLE_ID
            type: string
            default: ""
        volumes:
          - name: credentials
            emptyDir: {}
        steps:
          - name: get-kubeconfig
            ref:
              resolver: git
              params:
                - name: url
                  value: https://github.com/konflux-ci/build-definitions.git
                - name: revision
                  value: main
                - name: pathInRepo
                  value: stepactions/eaas-get-ephemeral-cluster-credentials/0.1/eaas-get-ephemeral-cluster-credentials.yaml
            params:
              - name: eaasSpaceSecretRef
                value: $(params.EAAS_SPACE_SECRET_REF)
              - name: clusterName
                value: $(params.CLUSTER_NAME)
              - name: credentials
                value: credentials
          - name: iqe-preflight
            image: registry.access.redhat.com/ubi9/ubi-minimal
            env:
              - name: GENERATED_KUBECONFIG
                value: "/credentials/$(steps.get-kubeconfig.results.kubeconfig)"
            volumeMounts:
              - name: credentials
                mountPath: /credentials
            script: |
              #!/usr/bin/env bash
              set -euo pipefail
              echo "IQE preflight starting"
              echo "IQE image: $(params.IQE_IMAGE)"
              echo "IQE plugins: $(params.IQE_PLUGINS)"
              echo "IQE marker: $(params.IQE_MARKER_EXPRESSION)"
              echo "IQE env: $(params.IQE_ENV)"
              echo "Cluster name: $(params.CLUSTER_NAME)"
              echo "Kubeconfig path from credential step: ${GENERATED_KUBECONFIG}"
              ls -la /credentials || true
              if [[ ! -f "${GENERATED_KUBECONFIG}" ]]; then
                echo "ERROR: kubeconfig file not found at ${GENERATED_KUBECONFIG}"
                exit 1
              fi
              echo "IQE preflight completed"
          - name: verify-iqe-image-access
            image: quay.io/konflux-ci/konflux-test:v1.4.48
            script: |
              #!/usr/bin/env bash
              set -euo pipefail
              echo "Checking IQE image access: $(params.IQE_IMAGE)"
              skopeo inspect --no-tags "docker://$(params.IQE_IMAGE)" >/tmp/inspect.json
              echo "IQE image is pullable"
          - name: run-iqe
            image: $(params.IQE_IMAGE)
            env:
              - name: GENERATED_KUBECONFIG
                value: "/credentials/$(steps.get-kubeconfig.results.kubeconfig)"
              - name: DYNACONF_IQE_VAULT_SECRET_ID
                valueFrom:
                  secretKeyRef:
                    name: cost-mgmt-vault-ci-secret
                    key: secret-id
            volumeMounts:
              - name: credentials
                mountPath: /credentials
            script: |
              #!/usr/bin/env bash
              set -euo pipefail
              trap 'echo "IQE step failed at line $LINENO with exit code $?."' ERR
              IQE_FILTER_EXPRESSION="$(params.IQE_FILTER_EXPRESSION)"
              IQE_EXTRA_ARGS="$(params.IQE_EXTRA_ARGS)"

              echo "Starting IQE step in image $(params.IQE_IMAGE)"
              command -v iqe
              iqe --help >/tmp/iqe-help.txt 2>&1 || true
              sed -n '1,6p' /tmp/iqe-help.txt || true
              echo "Installed IQE plugins:"
              iqe plugin list || true

              export DYNACONF_IQE_VAULT_LOADER_ENABLED="$(params.DYNACONF_IQE_VAULT_LOADER_ENABLED)"
              export DYNACONF_IQE_VAULT_URL="$(params.DYNACONF_IQE_VAULT_URL)"
              export DYNACONF_IQE_VAULT_VERIFY="$(params.DYNACONF_IQE_VAULT_VERIFY)"
              export DYNACONF_IQE_VAULT_MOUNT_POINT="$(params.DYNACONF_IQE_VAULT_MOUNT_POINT)"
              export DYNACONF_IQE_VAULT_ROLE_ID="$(params.DYNACONF_IQE_VAULT_ROLE_ID)"
              export ENV_FOR_DYNACONF="$(params.IQE_ENV)"
              export KUBECONFIG="${GENERATED_KUBECONFIG}"
              echo "Using kubeconfig ${KUBECONFIG}"
              echo "Vault loader enabled: ${DYNACONF_IQE_VAULT_LOADER_ENABLED}"

              if [[ "${DYNACONF_IQE_VAULT_LOADER_ENABLED}" == "true" ]]; then
                if [[ -z "${DYNACONF_IQE_VAULT_ROLE_ID}" || -z "${DYNACONF_IQE_VAULT_SECRET_ID}" ]]; then
                  echo "ERROR: Vault auth requires both DYNACONF_IQE_VAULT_ROLE_ID and DYNACONF_IQE_VAULT_SECRET_ID."
                  exit 14
                fi
                echo "Checking connectivity to ${DYNACONF_IQE_VAULT_URL} before IQE run..."
                vault_no_scheme="${DYNACONF_IQE_VAULT_URL#*://}"
                vault_hostport="${vault_no_scheme%%/*}"
                vault_host="${vault_hostport%%:*}"
                vault_port="443"
                if [[ "${vault_hostport}" == *:* ]]; then
                  vault_port="${vault_hostport##*:}"
                fi
                if [[ -z "${vault_host}" ]]; then
                  echo "ERROR: Unable to parse vault host from URL '${DYNACONF_IQE_VAULT_URL}'"
                  exit 13
                fi
                python -c 'import socket,sys; h=sys.argv[1]; p=int(sys.argv[2]); socket.create_connection((h,p),10).close(); print(f"Vault connectivity check passed: {h}:{p}")' \
                  "${vault_host}" "${vault_port}" || {
                    echo "ERROR: Vault connectivity check failed for ${vault_host}:${vault_port}"
                    exit 12
                  }
              fi

              iqe tests plugin "$(params.IQE_PLUGINS)" -m "$(params.IQE_MARKER_EXPRESSION)" \
                ${IQE_FILTER_EXPRESSION:+-k "${IQE_FILTER_EXPRESSION}"} \
                ${IQE_EXTRA_ARGS}
