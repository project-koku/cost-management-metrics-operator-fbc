apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  name: deploy-fbc-operator-with-iqe-run-v4-16
  labels:
    upstream-usable: "true"
spec:
  pipelineRef:
    resolver: git
    params:
      - name: url
        value: https://github.com/project-koku/cost-management-metrics-operator-fbc.git
      - name: revision
        value: main
      - name: pathInRepo
        value: .tekton/pipelines/deploy-fbc-operator-with-iqe.yaml
  params:
    - name: DYNACONF_IQE_VAULT_LOADER_ENABLED
      value: "true"
    - name: IQE_EXTRA_ARGS
      value: "--iqe-force-default-user=cost_management:iqe_prod"
    - name: DYNACONF_IQE_VAULT_ROLE_ID
      value: "6f1add7c-cf53-5190-16fa-51ef09046b14"
    - name: RELEASED_BUNDLE_IMAGE_OVERRIDE
      value: ""
  timeouts:
    pipeline: "2h30m0s"
  taskRunTemplate:
    serviceAccountName: build-pipeline-costmanagement-metrics-operator-fbc-component-v4-16
  workspaces:
    - name: shared-data
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 1Gi
